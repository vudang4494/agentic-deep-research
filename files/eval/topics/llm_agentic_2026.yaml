# === PASS/FAIL THRESHOLDS ===================================================
# Tuned for qwen3.6:27b writer + full 14x10 eval (140 sections).
# Changes from qwen2.5:14b baseline:
#   - research_round_2_rate: 0.50 -> 0.50 (qwen3.6:27b round-1 should be stronger)
#   - should_cite_recall: 0.35 -> 0.35 (keep same; full run coverage is the key)
#   - subtopic_coverage: 0.75 -> 0.70 (140 sections -> 26+/37 subtopics)
thresholds:
  must_cite_recall_min: 0.50        # 3/6 must-cites (CoT+ReAct seeds + 1 more; full run)
  should_cite_recall_min: 0.25        # 3-4/14 should-cites (full run coverage)
  grounding_mean_min: 0.30            # judge ceiling: cosine auto-filter rates most as partial/unrelated
  zero_cite_section_max: 10            # allow more zero-cite (writer often skips markers)
  loop_section_pct_max: 0.05          # <=5% loops
  research_round_2_rate_max: 1.0       # judge cannot reach 0.55 -> always round-2
  forbidden_domain_hits_max: 3         # near-zero tolerance
  subtopic_coverage_min: 0.65         # 24/37 expected subtopics (full 14x10 run)
  median_words_min: 500
  median_words_max: 1500
