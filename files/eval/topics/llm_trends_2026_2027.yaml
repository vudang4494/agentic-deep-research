# === PASS/FAIL THRESHOLDS ===================================================
# Strict thresholds for the v2 batiai/qwen3.6-35b pipeline.
thresholds:
  must_cite_recall_min: 0.60        # 9/15 must-cites retrieved
  should_cite_recall_min: 0.20       # 5/25 should-cites retrieved
  grounding_mean_min: 0.50            # avg HHEM grounding >= 0.50
  zero_cite_section_max: 3           # <= 3 sections with 0 citations
  loop_section_pct_max: 0.05         # <= 5% sections re-searched
  forbidden_domain_hits_max: 5       # near-zero tolerance
  subtopic_coverage_min: 0.80         # 80% of expected subtopics covered
  median_words_min: 600
  median_words_max: 2000
  quality_ok_pct_min: 0.90            # >= 90% sections "ok" quality
  v2_coverage_min: 0.90              # >= 90% sections verified with v2
