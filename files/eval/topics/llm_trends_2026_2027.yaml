# Gold-standard eval input for "LLM Trends 2026-2027" book.
# Full 12-chapter, 96-section technical handbook.
# Topic: Large Language Models — comprehensive coverage 2024-2026 frontier.
# Run with: python3 files/eval/run_eval.py --topic llm_trends_2026_2027 --skip-pipeline

topic: "Large Language Models: A Comprehensive Handbook"
subtitle: "Mathematics, Architecture, Training, Alignment, Deployment, and the Future of AI"
difficulty: comprehensive
n_chapters: 12
n_passes: 8

