# Gold-standard eval input for the Transformer architecture topic.
# Used by files/eval/run_eval.py to measure research quality of the
# Agentic Deep Research pipeline. Hand-curated 2026-05-27.

topic: "Transformer Architecture and Attention Mechanism"
difficulty: easy            # easy | medium | hard | niche
n_chapters: 2               # smaller outline -> faster eval (~15-25 min)
n_passes: 3                 # 6 sections total -- enough to test retrieval; halves arxiv call count vs 12-section run

# === GOLD SOURCES ===========================================================
# Papers that the retrieval layer SHOULD surface for this topic. Match by
# arxiv ID -- the pipeline stores sources with id "arxiv:<id>". The eval
# checks whether each id appears in ANY section's `sources` array.

must_cite:                  # canonical -- failure to retrieve = retrieval bug
  - arxiv: "1706.03762"
    title: "Attention Is All You Need (Vaswani et al., 2017)"
    aliases: ["Vaswani", "Attention Is All You Need"]
  - arxiv: "1607.06450"
    title: "Layer Normalization (Ba et al., 2016)"
    aliases: ["Layer Normalization", "LayerNorm"]

should_cite:                # strongly expected; partial credit
  - arxiv: "1810.04805"
    title: "BERT: Pre-training of Deep Bidirectional Transformers"
    aliases: ["BERT", "Devlin"]
  - arxiv: "2005.14165"
    title: "Language Models are Few-Shot Learners (GPT-3)"
    aliases: ["GPT-3", "few-shot learners"]
  - arxiv: "2104.09864"
    title: "RoFormer: Enhanced Transformer with Rotary Position Embedding"
    aliases: ["RoFormer", "rotary position embedding", "RoPE"]
  - arxiv: "1910.10683"
    title: "Exploring the Limits of Transfer Learning (T5)"
    aliases: ["T5", "text-to-text transfer transformer"]
  - arxiv: "2002.04745"
    title: "On Layer Normalization in the Transformer Architecture"
    aliases: ["Pre-LN", "Post-LN", "layer normalization transformer"]

# === DOMAIN HYGIENE =========================================================
# These should be filtered out by the bge-m3 noisy-domain prefilter.
# A hit in the final source list = prefilter regression.
forbidden_domains:
  - "techcrunch.com"
  - "medium.com"
  - "youtube.com"
  - "reddit.com"
  - "twitter.com"
  - "linkedin.com"

# === CONTENT COVERAGE =======================================================
# Substrings that must appear in the assembled book content. Tests whether
# the writer actually covered the core sub-mechanisms, not just produced
# generic prose. Case-insensitive substring match.
expected_subtopics:
  - "scaled dot-product attention"
  - "multi-head attention"
  - "positional encoding"
  - "query"
  - "key"
  - "value"
  - "softmax"
  - "layer normalization"
  - "residual connection"
  - "self-attention"

# Concepts the concept-tracker should mark "already defined" after first
# introduction. If they get re-defined in later sections, the dedupe
# directive is not working.
forbidden_redefines:
  - "self-attention"
  - "softmax"
  - "scaled dot-product attention"

# === PASS/FAIL THRESHOLDS ===================================================
# Aggregate metrics across all sections of this run.
thresholds:
  must_cite_recall_min: 0.80          # 80% of must_cite arxiv IDs found
  should_cite_recall_min: 0.40        # 40% of should_cite found (lenient)
  grounding_mean_min: 0.60            # mean per-section grounding score
  zero_cite_section_max: 0            # absolute cap: no section may have 0 citations
  loop_section_pct_max: 0.10          # <=10% sections may exhibit looping
  research_round_2_rate_max: 0.40     # <=40% sections needed a re-search
  forbidden_domain_hits_max: 0        # zero noisy-domain leakage allowed
  subtopic_coverage_min: 0.70         # 70% of expected_subtopics must appear
  median_words_min: 600               # writer not producing stubs
  median_words_max: 1600              # writer not over-ramping
